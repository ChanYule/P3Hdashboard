<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account – CareCircle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--green:#2e7d6b;--teal:#4db6ac;--ink:#18342e;--muted:#6c7d78;--line:#e6ecea;--bg:#f7f9fb;--white:#fff;--shadow:0 4px 18px rgba(23,55,48,.07)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font:14px/1.5 "DM Sans",sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    button,input{font:inherit}button{cursor:pointer}
    .auth-card{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:420px;padding:40px 36px}
    .brand{display:flex;gap:11px;align-items:center;margin-bottom:32px;text-decoration:none;color:var(--ink)}
    .brand-mark{width:36px;height:36px;display:grid;place-items:center;border-radius:10px;color:#fff;background:var(--green);font:800 20px Manrope}
    .brand span{font:700 18px Manrope}
    .brand small{display:block;font:500 10px "DM Sans";letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    h1{font:800 22px Manrope;margin:0 0 6px}
    .sub{color:var(--muted);font-size:13px;margin:0 0 28px}
    label{display:grid;gap:6px;font-size:11px;font-weight:700;color:#527067;margin-bottom:16px}
    input[type=text],input[type=email],input[type=password]{height:42px;border:1px solid var(--line);border-radius:8px;padding:0 12px;width:100%;outline:0;color:var(--ink);transition:.15s}
    input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,125,107,.12)}
    .button{border:1px solid var(--green);background:var(--green);color:#fff;height:42px;border-radius:8px;padding:0 18px;font-weight:700;display:flex;align-items:center;justify-content:center;width:100%;font-size:14px}
    .button:hover{background:#246b5a}
    .divider{text-align:center;color:var(--muted);font-size:12px;margin:22px 0;position:relative}
    .divider:before{content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line)}
    .divider span{background:var(--white);position:relative;padding:0 10px}
    .link-row{text-align:center;font-size:13px;color:var(--muted)}
    .link-row a{color:var(--green);font-weight:700;text-decoration:none}
    .error-msg{background:#fde9e8;color:#bb4b43;font-size:12px;border-radius:7px;padding:10px 12px;margin-bottom:16px;display:none}
    .error-msg.show{display:block}
    .success-msg{background:#e5f4eb;color:#28804c;font-size:12px;border-radius:7px;padding:10px 12px;margin-bottom:16px;display:none}
    .success-msg.show{display:block}
  </style>
</head>
<body>
  <div class="auth-card">
    <a class="brand" href="/login.html">
      <div class="brand-mark">C</div>
      <span>CareCircle<small>Care Management</small></span>
    </a>
    <h1>Create an account</h1>
    <p class="sub">Set up your CareCircle workspace in seconds.</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <form id="signupForm" autocomplete="on">
      <label>Full Name<input type="text" name="full_name" id="full_name" required placeholder="e.g. Melissa Chan"></label>
      <label>Username<input type="text" name="username" id="username" autocomplete="username" required placeholder="e.g. melissa.chan"></label>
      <label>Email<input type="email" name="email" id="email" autocomplete="email" required placeholder="e.g. melissa@carecentre.org"></label>
      <label>Password<input type="password" name="password" id="password" autocomplete="new-password" required placeholder="At least 8 characters"></label>
      <label>Confirm Password<input type="password" name="confirm_password" id="confirm_password" autocomplete="new-password" required placeholder="Re-enter your password"></label>
      <button class="button" type="submit" id="signupBtn">Create account</button>
    </form>
    <div class="divider"><span>Already have an account?</span></div>
    <div class="link-row"><a href="/login.html">Sign in instead</a></div>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('errorMsg');
      const ok  = document.getElementById('successMsg');
      btn.textContent = 'Creating account…';
      btn.disabled = true;
      err.classList.remove('show');
      ok.classList.remove('show');
      const body = {
        full_name: document.getElementById('full_name').value.trim(),
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        confirm_password: document.getElementById('confirm_password').value,
      };
      try {
        const res = await fetch('/auth/signup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) {
          ok.textContent = 'Account created! Redirecting to login…';
          ok.classList.add('show');
          setTimeout(() => location.href = '/login.html', 1500);
        } else {
          err.textContent = data.error || 'Sign up failed.';
          err.classList.add('show');
          btn.textContent = 'Create account';
          btn.disabled = false;
        }
      } catch {
        err.textContent = 'Connection error. Please try again.';
        err.classList.add('show');
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
